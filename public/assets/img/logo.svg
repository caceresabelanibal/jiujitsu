<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Taninzu: cinturon rojo anudado -->
  <defs>
    <linearGradient id="belt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e03a41"/>
      <stop offset=".55" stop-color="#c9252c"/>
      <stop offset="1" stop-color="#9c1b21"/>
    </linearGradient>
    <linearGradient id="beltDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b02228"/>
      <stop offset="1" stop-color="#7d151a"/>
    </linearGradient>
  </defs>
  <!-- banda -->
  <rect x="2" y="25" width="60" height="14" rx="4" fill="url(#belt)"/>
  <rect x="2" y="25" width="60" height="3.5" rx="1.75" fill="#ffffff" opacity=".14"/>
  <!-- barra de graduacion negra -->
  <rect x="50" y="25" width="7" height="14" fill="#1c1c1e"/>
  <!-- puntas colgantes -->
  <path d="M29 37 L21 58 Q20.4 60 22.6 60 L28.5 60 Q30 60 30.4 58.4 L33 40 Z" fill="url(#belt)"/>
  <path d="M35 37 L43 58 Q43.6 60 41.4 60 L35.5 60 Q34 60 33.6 58.4 L31 40 Z" fill="url(#beltDark)"/>
  <!-- nudo -->
  <path d="M24.5 23.5 L39.5 23.5 Q42 23.5 41.5 26 L40 38.5 Q39.7 40.5 37.5 40.5 L26.5 40.5 Q24.3 40.5 24 38.5 L22.5 26 Q22 23.5 24.5 23.5 Z" fill="url(#beltDark)" stroke="#6e1216" stroke-width="1"/>
  <path d="M25.5 25 L31 32 L26.8 39 Z" fill="#c9252c" opacity=".85"/>
  <path d="M38.5 25 L33 32 L37.2 39 Z" fill="#c9252c" opacity=".85"/>
</svg>
