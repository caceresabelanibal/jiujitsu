services:
  app:
    build: .
    container_name: bjj_app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - uploads:/var/www/html/public/uploads
      - storage:/var/www/html/storage
    environment:
      DB_HOST: db
      DB_NAME: bjj
      DB_USER: bjj
      DB_PASS: bjjsecret
      APP_URL: http://localhost:8080
      APP_ENV: dev
      CRON_KEY: changeme-cron-key
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_SECURE: ""
      MAIL_FROM: torneos@taninzu.com
      MAIL_FROM_NAME: Taninzu
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: bjj_db
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: bjj
      MYSQL_USER: bjj
      MYSQL_PASSWORD: bjjsecret
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog:latest
    container_name: bjj_mailhog
    ports:
      - "8025:8025"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bjj_pma
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootsecret
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  dbdata:
  vendor:
  uploads:
  storage:
