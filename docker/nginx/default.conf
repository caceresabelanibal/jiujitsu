# Reverse proxy TLS para Taninzu. Termina HTTPS (443) con el certificado de
# DonWeb/Sectigo y reenvía a la app (Apache) por la red interna de Docker.
# El puerto 80 solo redirige a HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name taninzu.com www.taninzu.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name taninzu.com www.taninzu.com;

    # taninzu.crt = certificado del dominio + intermedios (fullchain), en ese orden.
    # taninzu.key = clave privada.
    ssl_certificate     /etc/nginx/certs/taninzu.crt;
    ssl_certificate_key /etc/nginx/certs/taninzu.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Fotos/logos: permitir subidas de hasta 25 MB (Apache/PHP también deben permitirlo)
    client_max_body_size 25m;

    location / {
        proxy_pass http://app:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;   # la app arma los links/redirects en https
        proxy_read_timeout 120s;
    }
}
