; Límites de subida de archivos (fotos de competidores).
; upload_max_filesize venía en 2M (default de PHP) — cualquier foto de celular
; lo superaba y se descartaba en silencio. post_max_size tiene que ser mayor
; que upload_max_filesize (incluye el resto de los campos del form).
; El JS igual redimensiona la foto en el navegador antes de subirla, así que
; en la práctica el POST queda muy por debajo de esto; esto es el margen de red.
upload_max_filesize = 12M
post_max_size = 13M

; No mostrar errores en el ARRANQUE del request. El warning "POST Content-Length
; exceeds the limit" se emite antes de que corra el código (línea 0) y, si se
; imprime, rompe el session_start() posterior ("headers already sent") — que era
; justamente lo que hacía explotar la app al subir una foto muy pesada. Ahora ese
; caso lo maneja post_exceeded_limit() con un mensaje amable. bootstrap.php vuelve
; a prender display_errors en dev vía ini_set() para los errores de ejecución, así
; que solo se oculta el warning de arranque (no se pierde debugging real).
display_errors = Off
